<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Job Scam Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,255,0,0.2);
      padding: 40px;
      width: 90%;
      max-width: 600px;
      text-align: center;
      border: 1px solid rgba(0,255,0,0.1);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #00ff88;
      font-size: 26px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 130px;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      border: none;
      resize: none;
      margin-bottom: 15px;
    }

    input[type="file"] {
      color: #ccc;
      margin: 10px 0;
    }

    button {
      padding: 12px 30px;
      font-size: 16px;
      background: #00ff88;
      border: none;
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 10px #00ff88;
      transition: all 0.3s;
    }

    button:hover {
      background: #00cc66;
      box-shadow: 0 0 20px #00ff88;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>🔍 AI Job Scam Detector</h1>
    <form method="POST" enctype="multipart/form-data">
      <label>📝 Paste Job Description</label><br>
      <textarea name="description" placeholder="Paste or type job description here..."></textarea>

      <label>🖼️ Or Upload Job Screenshot</label><br>
      <input type="file" name="image"><br><br>

      <button type="submit">🚀 Detect Now</button>
    </form>
  </div>
</body>
</html>
